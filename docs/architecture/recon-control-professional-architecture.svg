<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 38px Arial, Helvetica, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #94A3B8; }
      .section { font: 700 20px Arial, Helvetica, sans-serif; fill: #E2E8F0; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #F8FAFC; }
      .body { font: 400 14px Arial, Helvetica, sans-serif; fill: #CBD5E1; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #94A3B8; }
      .pill { font: 700 13px Arial, Helvetica, sans-serif; fill: #0F172A; }
      .arrow { stroke: #38BDF8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-soft { stroke: #64748B; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 8; }
      .card { fill: #0F172A; stroke: #1E293B; stroke-width: 2; rx: 22; }
      .card-light { fill: #111C30; stroke: #334155; stroke-width: 2; rx: 22; }
      .tag { fill: #E2F2FF; rx: 14; }
      .tag-green { fill: #D1FAE5; rx: 14; }
      .tag-amber { fill: #FEF3C7; rx: 14; }
      .tag-red { fill: #FEE2E2; rx: 14; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10" fill="#38BDF8"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="70" y="80" class="title">Recon Control Banking Backend Architecture</text>
  <text x="70" y="115" class="subtitle">Spring Boot, event-driven banking flows, observability, AI-ready ops assistance, and markdown-coordinated security workflow</text>

  <rect x="70" y="155" width="180" height="44" rx="22" fill="url(#accent)"/>
  <text x="101" y="184" class="pill">Production-oriented learning system</text>

  <rect x="70" y="240" width="250" height="250" rx="22" class="card-light" filter="url(#shadow)"/>
  <text x="95" y="280" class="section">User and Entry Layer</text>
  <rect x="95" y="305" width="200" height="56" rx="16" fill="#132238" stroke="#334155"/>
  <text x="118" y="338" class="label">Swagger and Internal Users</text>
  <text x="118" y="357" class="small">ops-admin, ops-user, auditor</text>
  <rect x="95" y="378" width="200" height="56" rx="16" fill="#132238" stroke="#334155"/>
  <text x="118" y="411" class="label">REST APIs</text>
  <text x="118" y="430" class="small">accounts, transactions, fraud, ops</text>
  <rect x="95" y="451" width="200" height="20" class="tag"/>
  <text x="112" y="466" class="pill">JWT security and role-based access</text>

  <rect x="360" y="190" width="460" height="370" rx="24" class="card" filter="url(#shadow)"/>
  <text x="390" y="230" class="section">Core Spring Boot Banking Domain</text>

  <rect x="390" y="255" width="185" height="86" rx="18" fill="#132238" stroke="#334155"/>
  <text x="412" y="287" class="label">Accounts</text>
  <text x="412" y="309" class="body">customer account opening,</text>
  <text x="412" y="328" class="body">balance state, account reads</text>

  <rect x="600" y="255" width="185" height="86" rx="18" fill="#132238" stroke="#334155"/>
  <text x="622" y="287" class="label">Transactions</text>
  <text x="622" y="309" class="body">booking, settlement pending,</text>
  <text x="622" y="328" class="body">settled lifecycle control</text>

  <rect x="390" y="360" width="185" height="86" rx="18" fill="#132238" stroke="#334155"/>
  <text x="412" y="392" class="label">Fraud Control</text>
  <text x="412" y="414" class="body">event-driven fraud checks,</text>
  <text x="412" y="433" class="body">fraud case creation and review</text>

  <rect x="600" y="360" width="185" height="86" rx="18" fill="#132238" stroke="#334155"/>
  <text x="622" y="392" class="label">Ops Assistant APIs</text>
  <text x="622" y="414" class="body">incident summary, correlation</text>
  <text x="622" y="433" class="body">explanation, ops Q and A</text>

  <rect x="390" y="468" width="395" height="60" rx="18" fill="#111C30" stroke="#334155"/>
  <text x="414" y="495" class="label">Security and Coordination</text>
  <text x="414" y="517" class="body">JWT, RequestLoggingFilter, CLAUDE.md-guided delivery, controlled developer workflow</text>

  <rect x="870" y="190" width="310" height="190" rx="22" class="card-light" filter="url(#shadow)"/>
  <text x="900" y="230" class="section">Data and Event Layer</text>
  <rect x="900" y="255" width="120" height="54" rx="16" fill="#132238" stroke="#334155"/>
  <text x="923" y="288" class="label">PostgreSQL</text>
  <rect x="1040" y="255" width="110" height="54" rx="16" fill="#132238" stroke="#334155"/>
  <text x="1070" y="288" class="label">Redis</text>
  <rect x="900" y="325" width="250" height="54" rx="16" fill="#132238" stroke="#334155"/>
  <text x="923" y="357" class="label">Kafka plus Outbox Pattern</text>

  <rect x="1215" y="190" width="315" height="450" rx="22" class="card-light" filter="url(#shadow)"/>
  <text x="1245" y="230" class="section">Observability and Ops Intelligence</text>

  <rect x="1245" y="255" width="255" height="60" rx="16" fill="#132238" stroke="#334155"/>
  <text x="1270" y="286" class="label">Prometheus plus Grafana</text>
  <text x="1270" y="306" class="small">metrics, request rate, heap, dashboards</text>

  <rect x="1245" y="330" width="255" height="60" rx="16" fill="#132238" stroke="#334155"/>
  <text x="1270" y="361" class="label">Elasticsearch plus Kibana</text>
  <text x="1270" y="381" class="small">searchable structured logs and analysis</text>

  <rect x="1245" y="405" width="255" height="60" rx="16" fill="#132238" stroke="#334155"/>
  <text x="1270" y="436" class="label">Filebeat</text>
  <text x="1270" y="456" class="small">moves application logs into Elasticsearch</text>

  <rect x="1245" y="485" width="255" height="120" rx="18" fill="#111C30" stroke="#334155"/>
  <text x="1270" y="516" class="label">AI-ready Operational Layer</text>
  <text x="1270" y="540" class="body">Incident summary</text>
  <text x="1270" y="562" class="body">Correlation explanation</text>
  <text x="1270" y="584" class="body">Ops assistant using logs, metrics, and docs</text>

  <rect x="70" y="580" width="1110" height="290" rx="24" class="card" filter="url(#shadow)"/>
  <text x="100" y="620" class="section">Security Architecture and AI-SAST Workflow</text>
  <text x="100" y="648" class="body">Markdown-coordinated security review flow designed to keep AI-assisted development controlled, auditable, and repeatable.</text>

  <rect x="100" y="685" width="145" height="46" class="tag"/>
  <text x="125" y="715" class="pill">Threat model</text>
  <rect x="265" y="685" width="140" height="46" class="tag"/>
  <text x="292" y="715" class="pill">Scan policy</text>
  <rect x="425" y="685" width="145" height="46" class="tag"/>
  <text x="453" y="715" class="pill">Triage policy</text>
  <rect x="590" y="685" width="165" height="46" class="tag"/>
  <text x="616" y="715" class="pill">Finding template</text>
  <rect x="775" y="685" width="225" height="46" class="tag"/>
  <text x="802" y="715" class="pill">Dated security reports</text>

  <rect x="100" y="760" width="980" height="78" rx="18" fill="#111C30" stroke="#334155"/>
  <text x="125" y="792" class="label">Workflow</text>
  <text x="125" y="818" class="body">Developer branch -> AI-SAST orchestration -> architecture and threat analysis -> mandatory scans -> optional scans -> human triage -> remediation or merge decision</text>

  <rect x="1105" y="685" width="45" height="46" class="tag-green"/>
  <text x="1118" y="715" class="pill">JWT</text>
  <rect x="1105" y="742" width="72" height="46" class="tag-green"/>
  <text x="1120" y="772" class="pill">IDOR</text>
  <rect x="1105" y="799" width="118" height="46" class="tag-green"/>
  <text x="1120" y="829" class="pill">Missing auth</text>
  <rect x="1240" y="685" width="150" height="46" class="tag-amber"/>
  <text x="1260" y="715" class="pill">Business logic</text>
  <rect x="1240" y="742" width="82" height="46" class="tag-amber"/>
  <text x="1261" y="772" class="pill">SSRF</text>
  <rect x="1240" y="799" width="170" height="46" class="tag-red"/>
  <text x="1260" y="829" class="pill">Human review required</text>

  <line x1="320" y1="365" x2="360" y2="365" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="820" y1="335" x2="870" y2="300" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="820" y1="425" x2="870" y2="355" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="820" y1="500" x2="1215" y2="545" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1180" y1="305" x2="1215" y2="305" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1180" y1="350" x2="1215" y2="350" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1340" y1="390" x2="1340" y2="405" class="arrow-soft" marker-end="url(#arrowhead-soft)"/>
  <line x1="320" y1="420" x2="1215" y2="255" class="arrow-soft" marker-end="url(#arrowhead-soft)"/>
  <line x1="1040" y1="560" x2="1040" y2="580" class="arrow-soft" marker-end="url(#arrowhead-soft)"/>

  <text x="71" y="930" class="small">Created for project presentation: banking backend + observability + security architecture + AI-ready ops coordination</text>
</svg>
