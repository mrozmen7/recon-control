name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -q test

      - name: Build application jar
        run: ./mvnw -q -DskipTests package

      - name: Build Docker image
        run: docker build -t recon-control:ci .
