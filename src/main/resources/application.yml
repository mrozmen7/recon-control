spring:
  application:
    name: recon-control
  datasource:
    url: jdbc:postgresql://localhost:5433/recon_control
    username: recon_app
    password: recon_secret
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379

app:
  security:
    jwt:
      secret: recon-control-super-secret-key-recon-control-2026
      issuer: recon-control
      expiry-minutes: 60
  rate-limit:
    transaction-create:
      limit: 5
      window-seconds: 60
  idempotency:
    transaction-create:
      ttl-hours: 24

resilience4j:
  retry:
    instances:
      transactionCreation:
        max-attempts: 3
        wait-duration: 100ms
        retry-exceptions:
          - org.springframework.dao.OptimisticLockingFailureException
          - org.springframework.orm.ObjectOptimisticLockingFailureException

server:
  port: 8080

logging:
  level:
    root: INFO
    com.yavuzozmen.reconcontrol: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
