spring:
  application:
    name: recon-control
  datasource:
    url: jdbc:postgresql://localhost:5433/recon_control
    username: recon_app
    password: recon_secret
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "*"

app:
  security:
    jwt:
      secret: recon-control-super-secret-key-recon-control-2026
      issuer: recon-control
      expiry-minutes: 60
  rate-limit:
    transaction-create:
      limit: 5
      window-seconds: 60
  idempotency:
    transaction-create:
      ttl-hours: 24
  kafka:
    topics:
      transaction-events: recon-control.transaction-events
      transaction-events-dlt: recon-control.transaction-events.dlt
      fraud-alert-events: recon-control.fraud-alert-events
    consumer:
      fraud-group-id: recon-control-fraud-evaluator
  outbox:
    publisher:
      delay-ms: 1000
      batch-size: 20
  fraud:
    rules:
      high-amount-threshold: 1000.00
      burst-threshold: 3
      burst-window-minutes: 10
  observability:
    correlation-header: X-Correlation-Id

resilience4j:
  retry:
    instances:
      transactionCreation:
        max-attempts: 3
        wait-duration: 100ms
        retry-exceptions:
          - org.springframework.dao.OptimisticLockingFailureException
          - org.springframework.orm.ObjectOptimisticLockingFailureException
  timelimiter:
    instances:
      outboxPublishing:
        timeout-duration: 5s

server:
  port: 8080
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: Banking-grade reconciliation and settlement control system
    phase: faz-4-production-readiness

logging:
  level:
    root: INFO
    com.yavuzozmen.reconcontrol: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
